name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================
  # CI: Continuous Integration
  # ============================================
  build:
    name: Build Package
    runs-on: self-hosted
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build package
        run: npm run build

      - name: Verify build outputs
        run: |
          echo "Verifying build artifacts..."
          test -f dist/apex.css || (echo "dist/apex.css not found" && exit 1)
          test -f dist/base.css || (echo "dist/base.css not found" && exit 1)
          test -f dist/utilities.css || (echo "dist/utilities.css not found" && exit 1)
          test -f dist/themes.css || (echo "dist/themes.css not found" && exit 1)
          echo "All build outputs verified"

  test:
    name: Run Tests
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Install Playwright dependencies
        run: npm run test:e2e:install

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ============================================
  # CD: Continuous Deployment
  # ============================================
  publish:
    name: Publish to NPM
    runs-on: self-hosted
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify built dist output
        run: |
          echo "Verifying locally built dist output..."
          test -f dist/apex.css      || (echo "dist/apex.css not found"      && exit 1)
          test -f dist/base.css      || (echo "dist/base.css not found"      && exit 1)
          test -f dist/utilities.css || (echo "dist/utilities.css not found" && exit 1)
          test -f dist/themes.css    || (echo "dist/themes.css not found"    && exit 1)
          echo "Dist output is ready for publish"

      - name: Check if version exists on NPM
        id: check-version
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view apexcss@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on NPM"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION does not exist on NPM"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM (Push to main)
        if: github.event_name == 'push' && steps.check-version.outputs.exists == 'false'
        run: |
          echo "Publishing version ${{ steps.check-version.outputs.version }} to NPM..."
          npm publish --access public
          echo "Published successfully!"

      - name: Skip publish (version exists)
        if: steps.check-version.outputs.exists == 'true'
        run: |
          echo "Skipping publish - version ${{ steps.check-version.outputs.version }} already exists on NPM"

      - name: Create Git Tag
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check-version.outputs.exists == 'false'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          chmod +x ./create-tag.sh
          ./create-tag.sh "v${{ steps.check-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.check-version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.version }}
          name: v${{ steps.check-version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
